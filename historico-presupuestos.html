<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rita Roux · Histórico de Cotizaciones</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="gsheets.js"></script>
<style>
:root{
  --rojo:#CC1F1F;--rojo-osc:#A01818;--rojo-cl:#FFF5F5;
  --negro:#1A1A1A;--gris:#F4F4F4;--gris-m:#E0E0E0;--gris-t:#777;
  --blanco:#FFFFFF;--verde:#2E7D32;--verde-cl:#E8F5E9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--gris);color:var(--negro);min-height:100vh}
header{background:var(--negro);display:flex;align-items:stretch;position:sticky;top:0;z-index:100}
.hdr-logo{background:var(--rojo);padding:14px 22px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:110px}
.hdr-logo .lt{color:var(--negro);font-size:18px;font-weight:900;letter-spacing:3px;font-style:italic;text-transform:uppercase;line-height:1}
.hdr-logo .ls{color:var(--negro);font-size:7px;letter-spacing:3px;text-transform:uppercase;margin-top:3px;opacity:.65}
.hdr-info{padding:14px 22px;display:flex;flex-direction:column;justify-content:center;flex:1}
.hdr-info h1{color:var(--blanco);font-size:15px;font-weight:300;letter-spacing:2px;text-transform:uppercase}
.hdr-info p{color:var(--rojo);font-size:10px;letter-spacing:1px;margin-top:2px}
.hdr-act{display:flex;align-items:center;gap:8px;padding:0 22px}
.btn{padding:8px 16px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;font-family:inherit;border-radius:2px;transition:all .15s}
.btn-sec{background:transparent;color:var(--blanco);border:1.5px solid rgba(255,255,255,.3)}.btn-sec:hover{border-color:var(--blanco)}
.btn-pr{background:var(--rojo);color:var(--blanco)}.btn-pr:hover{background:var(--rojo-osc)}

.main{max-width:1200px;margin:0 auto;padding:22px 24px}

.banner{background:var(--blanco);border:1px solid var(--gris-m);border-radius:4px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px}
.banner.ok{border-color:var(--verde);background:var(--verde-cl)}
.banner-text{flex:1;font-size:12px;color:var(--gris-t)}
.banner.ok .banner-text{color:var(--verde)}

.sum-row{display:flex;gap:0;background:var(--blanco);border:1px solid var(--gris-m);border-radius:4px;margin-bottom:18px;overflow-x:auto}
.sum-c{flex:1;min-width:140px;padding:14px 18px;border-right:1px solid var(--gris-m)}
.sum-c:last-child{border-right:none}
.sum-l{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gris-t);margin-bottom:5px}
.sum-v{font-size:22px;font-weight:300}

.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.srch{flex:1;min-width:200px;position:relative}
.srch input{width:100%;padding:8px 12px 8px 30px;border:1px solid var(--gris-m);font-family:inherit;font-size:12px;border-radius:2px;outline:none}
.srch input:focus{border-color:var(--rojo)}
.srch::before{content:"⌕";position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--gris-t);font-size:15px}

.tbl{background:var(--blanco);border:1px solid var(--gris-m);border-radius:4px;overflow:hidden}
.tbl table{width:100%;border-collapse:collapse}
.tbl th{background:var(--negro);color:var(--blanco);padding:10px 14px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;text-align:left;font-weight:600;white-space:nowrap}
.tbl td{padding:10px 14px;font-size:12px;border-bottom:1px solid var(--gris-m)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#fafafa}
.amt{font-variant-numeric:tabular-nums;white-space:nowrap}

.empty{text-align:center;padding:60px 20px;color:var(--gris-t)}
.empty .ico{font-size:36px;margin-bottom:10px}
.cot-tag{font-family:monospace;font-size:11px;background:var(--gris);padding:2px 6px;border-radius:2px;color:var(--negro);font-weight:600}
</style>
</head>
<body>

<header>
  <div class="hdr-logo"><span class="lt">Rita</span><span class="lt">Roux</span><span class="ls">Café</span></div>
  <div class="hdr-info">
    <h1>Histórico de Cotizaciones</h1>
    <p>Todas las cotizaciones generadas</p>
  </div>
  <div class="hdr-act">
    <button class="btn btn-sec" onclick="location.href='seguimiento-eventos.html'">Inicio</button>
    <button class="btn btn-sec" id="btn-google-hist" onclick="gsAuth()">☁ Google</button>
    <button class="btn btn-pr" onclick="location.href='cotizador-rita-roux.html'">+ Nueva Cotización</button>
  </div>
</header>

<div class="main">
  <div class="banner" id="banner">
    <div class="banner-text">Conecta con Google para ver el histórico completo guardado en Google Sheets. Mientras tanto se muestra el respaldo local de este navegador.</div>
    <button class="btn btn-sec" style="background:var(--negro)" onclick="gsAuth()">☁ Conectar Google</button>
  </div>

  <div class="sum-row" id="sumRow"></div>

  <div class="toolbar">
    <div class="srch"><input type="text" id="srch" placeholder="Buscar por cliente o evento…" oninput="render()"></div>
  </div>

  <div id="tblWrap"></div>
</div>

<script>
let registros = [];

function volver(){
  if (window.opener && !window.opener.closed) { window.close(); return; }
  if (window.history.length > 1) { window.history.back(); return; }
  window.location.href = 'seguimiento-eventos.html';
}

async function cargarDatos(){
  if (gsConnected()) {
    try {
      const res = await gsGet(`${TAB.PRESUPUESTOS}!A2:K`);
      const rows = res.values || [];
      registros = rows.map(r => ({
        cotizacion:  r[0]||'',
        fecha:       r[1]||'',
        cliente:     r[2]||'',
        evento:      r[3]||'',
        fechaEvento: r[4]||'',
        personas:    r[5]||'',
        subtotal:    +r[6]||0,
        iva:         +r[7]||0,
        total:       +r[8]||0,
        estado:      r[9]||'pendiente',
        secciones:   (() => { try { return r[10] ? JSON.parse(r[10]) : []; } catch { return []; } })(),
      }));
      document.getElementById('btn-google-hist').textContent = '✓ Google';
      const b = document.getElementById('banner');
      b.classList.add('ok');
      b.querySelector('.banner-text').innerHTML = `Conectado a Google Sheets · ${registros.length} cotizaciones`;
      render(); return;
    } catch(e) { console.warn(e); }
  }
  const local = JSON.parse(localStorage.getItem('rr_historial_presupuestos')||'[]');
  registros = local;
  render();
}

function emitirNV(idx) {
  const r = registros[idx];
  if (!r) return;
  const seccionesNV = (r.secciones || []).map(sec => ({
    nombre: sec.name || sec.nombre || '',
    items: (sec.items || []).filter(i => i.desc || i.unitPrice > 0 || i.vNeto > 0).map(i => ({
      desc:  i.desc  || '',
      horas: i.qty   || i.horas || '',
      vUnit: i.unitPrice || i.vUnit || 0,
      vNeto: i.vNeto != null ? i.vNeto : (i.qty||0)*(i.unitPrice||0),
    }))
  })).filter(s => s.items.length > 0);
  localStorage.setItem('rr_cotizacion_para_nv', JSON.stringify({
    cotizacion:  r.cotizacion,
    fecha:       r.fecha,
    cliente:     r.cliente,
    evento:      r.evento,
    fechaEvento: r.fechaEvento,
    personas:    r.personas,
    subtotal:    r.subtotal,
    iva:         r.iva,
    total:       r.total,
    secciones:   seccionesNV,
  }));
  location.href = 'rita-roux-notas-venta.html';
}

function descargarPresupuesto(idx) {
  const r = registros[idx];
  if (!r) return;
  if (typeof window.jspdf === 'undefined') { alert('Librería PDF aún cargando, intenta de nuevo.'); return; }
  const blob = generarPDFHistorico(r);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Cotizacion_${r.cotizacion}_${(r.cliente||'').replace(/\s+/g,'_').slice(0,20)}.pdf`;
  a.click();
  URL.revokeObjectURL(url);
}

function generarPDFHistorico(reg) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  const W=215.9, M=18; let y=0;

  doc.setFillColor(204,31,31); doc.rect(0,0,W,38,'F');
  doc.setTextColor(26,26,26); doc.setFontSize(22); doc.setFont('helvetica','bolditalic');
  doc.text('RITA ROUX',M,16);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(40,10,10);
  doc.text('CLASES CULTURALES Y EVENTOS',M,22);
  const rX=W-M;
  doc.setTextColor(26,26,26); doc.setFontSize(7.5);
  doc.text('RUT 76.208.211-K',rX,10,{align:'right'});
  doc.text('Mac Iver 484, Oficina 105',rX,15,{align:'right'});
  doc.text('finanzas@ritaroux.cl',rX,20,{align:'right'});
  doc.setTextColor(255,255,255); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text('COTIZACIÓN',rX,30,{align:'right'});
  doc.setFontSize(9); doc.setTextColor(255,220,220);
  doc.text(reg.cotizacion||'',rX,36,{align:'right'});
  y=48;

  const boxW=(W-M*2-6)/2;
  doc.setFillColor(26,26,26); doc.rect(M,y,boxW,34,'F');
  doc.setTextColor(150,150,150); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('EMPRESA EMISORA',M+4,y+6);
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text('Inv. Verónica Méndez Risopátrón E.I.R.L.',M+4,y+13);
  doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(200,200,200);
  doc.text('RUT 76.208.211-K',M+4,y+19);
  doc.text('Mac Iver 484, Oficina 105',M+4,y+25);
  doc.text('finanzas@ritaroux.cl',M+4,y+31);

  const cX=M+boxW+6;
  doc.setFillColor(245,245,245); doc.rect(cX,y,boxW,34,'F');
  doc.setTextColor(204,31,31); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('CLIENTE / EVENTO',cX+4,y+6);
  doc.setTextColor(26,26,26); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
  doc.text((reg.cliente||'Sin especificar').slice(0,42),cX+4,y+13);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(60,60,60);
  if(reg.evento)      doc.text('Evento: '+reg.evento,cX+4,y+20);
  if(reg.fechaEvento) doc.text('Fecha:  '+fmtF(reg.fechaEvento),cX+4,y+26);
  if(reg.personas)    doc.text('Nº personas: '+reg.personas,cX+4,y+32);
  y+=40;

  const secciones = reg.secciones||[];
  let hayDesglose = false;
  secciones.forEach(sec => {
    const items=(sec.items||[]).filter(i=>i.desc||(i.unitPrice>0)||(i.vNeto>0));
    if(!items.length) return;
    hayDesglose = true;
    if(y>220){doc.addPage();y=20;}
    doc.setFillColor(26,26,26); doc.rect(M,y,W-M*2,7,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text((sec.name||sec.nombre||'').toUpperCase(),M+3,y+5);
    y+=7;
    const rows=items.map(i=>[
      i.desc||'',
      (i.qty||0)>0?String(i.qty):((i.horas||0)>0?String(i.horas):'1'),
      (i.unitPrice||i.vUnit)>0?('$'+Math.round(i.unitPrice||i.vUnit||0).toLocaleString('es-CL')):'',
      '$'+Math.round(i.vNeto!=null?i.vNeto:((i.qty||0)*(i.unitPrice||0))).toLocaleString('es-CL')
    ]);
    doc.autoTable({startY:y,head:[['Descripción','Cantidad','Valor Unit.','Valor Neto']],body:rows,
      margin:{left:M,right:M},styles:{fontSize:8.5,cellPadding:3,textColor:[26,26,26]},
      headStyles:{fillColor:[240,240,240],textColor:[26,26,26],fontStyle:'bold',fontSize:8},
      columnStyles:{0:{cellWidth:85},1:{halign:'right',cellWidth:20},2:{halign:'right',cellWidth:38},3:{halign:'right',cellWidth:38}},
      theme:'plain',alternateRowStyles:{fillColor:[250,250,250]}});
    y=doc.lastAutoTable.finalY+6;
  });
  if(!hayDesglose){
    doc.setFontSize(9); doc.setFont('helvetica','italic'); doc.setTextColor(150,150,150);
    doc.text('Desglose de servicios no disponible para esta cotización.',M,y+6);
    y+=14;
  }

  if(y>200){doc.addPage();y=20;}
  const tY=y+4;
  doc.setDrawColor(220,220,220); doc.line(M,tY,W-M,tY);
  const tX=W-M;
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
  doc.text('Subtotal (Neto)',tX-50,tY+8); doc.setTextColor(26,26,26);
  doc.text('$'+Math.round(reg.subtotal||0).toLocaleString('es-CL'),tX,tY+8,{align:'right'});
  doc.setTextColor(100,100,100); doc.text('IVA (19%)',tX-50,tY+15); doc.setTextColor(26,26,26);
  doc.text('$'+Math.round(reg.iva||0).toLocaleString('es-CL'),tX,tY+15,{align:'right'});
  doc.setDrawColor(204,31,31); doc.line(tX-62,tY+18,tX,tY+18);
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(204,31,31);
  doc.text('TOTAL',tX-50,tY+26);
  doc.text('$'+Math.round(reg.total||0).toLocaleString('es-CL'),tX,tY+26,{align:'right'});

  const pH=doc.internal.pageSize.height;
  doc.setFillColor(26,26,26); doc.rect(0,pH-12,W,12,'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(200,200,200);
  doc.text('Inversiones Verónica Méndez Risopátrón E.I.R.L.  ·  Mac Iver 484, Oficina 105  ·  finanzas@ritaroux.cl  ·  RUT 76.208.211-K',W/2,pH-4.5,{align:'center'});
  return doc.output('blob');
}

function fmtM(n){ if(!n&&n!==0) return '—'; return '$'+Math.round(n).toLocaleString('es-CL'); }
function fmtF(s){ if(!s) return '—'; try{ return new Date(s+'T00:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return s; } }

function render(){
  const q = document.getElementById('srch').value.toLowerCase();
  const lista = registros
    .filter(r => !q || r.cliente.toLowerCase().includes(q) || r.evento.toLowerCase().includes(q))
    .sort((a,b)=> new Date(b.fecha) - new Date(a.fecha));

  const totalCotizado = registros.reduce((a,r)=>a+(r.total||0),0);
  document.getElementById('sumRow').innerHTML = `
    <div class="sum-c"><div class="sum-l">Cotizaciones generadas</div><div class="sum-v">${registros.length}</div></div>
    <div class="sum-c"><div class="sum-l">Monto total cotizado</div><div class="sum-v">${fmtM(totalCotizado)}</div></div>
    <div class="sum-c"><div class="sum-l">Promedio por cotización</div><div class="sum-v">${fmtM(registros.length?totalCotizado/registros.length:0)}</div></div>
  `;

  const wrap = document.getElementById('tblWrap');
  if(!lista.length){
    wrap.innerHTML = `<div class="empty"><div class="ico">🧾</div><p>Sin cotizaciones registradas todavía.</p></div>`;
    return;
  }
  const idxMap = lista.map(r => registros.indexOf(r));
  wrap.innerHTML = `<div class="tbl"><table>
    <thead><tr><th>Nº Cotización</th><th>Fecha</th><th>Cliente</th><th>Evento</th><th>Fecha Evento</th><th>Personas</th><th>Total</th><th></th></tr></thead>
    <tbody>${lista.map((r,i)=>{
      return `<tr>
        <td><span class="cot-tag">${r.cotizacion}</span></td>
        <td>${fmtF(r.fecha)}</td>
        <td style="font-weight:600">${r.cliente}</td>
        <td>${r.evento||'—'}</td>
        <td>${fmtF(r.fechaEvento)}</td>
        <td>${r.personas||'—'}</td>
        <td class="amt" style="font-weight:600">${fmtM(r.total)}</td>
        <td style="display:flex;gap:6px;align-items:center">
          <button onclick="descargarPresupuesto(${idxMap[i]})" title="Descargar PDF" style="padding:4px 8px;font-size:12px;background:var(--gris);color:var(--negro);border:1px solid var(--gris-m);border-radius:2px;cursor:pointer">⬇</button>
          <button onclick="emitirNV(${idxMap[i]})" style="padding:4px 10px;font-size:9px;font-weight:700;letter-spacing:.5px;background:#1565C0;color:#fff;border:none;border-radius:2px;cursor:pointer;white-space:nowrap">Emitir NV →</button>
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

(function init(){
  gsInit(cargarDatos, { requireAuth: true });
  cargarDatos();
})();
</script>
</body>
</html>
